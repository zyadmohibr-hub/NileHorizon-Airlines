<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile Horizon — Account</title>
    <link rel="stylesheet" href="style.css">
    <link id="themeStylesheet" rel="stylesheet" href="light.css">
    <style>
        .form-section { display: none; }
        .form-section.active { display: block; animation: slideIn 0.4s ease-out; }

        @keyframes slideIn { 
            from { transform: translateY(10px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .tab-btn { 
            cursor: pointer; 
            padding: 10px 25px; 
            border: none; 
            background: none; 
            font-size: 1.1rem; 
            transition: 0.3s; 
            color: #888;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active { 
            color: #d4af37; 
            border-bottom: 3px solid #d4af37; 
            font-weight: 900 !important;
        }

        .form-section h1 {
            font-weight: 900 !important;
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: inherit; 
        }

        .inputs label {
            display: block;
            font-weight: 900 !important;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: inherit;
        }

        .inputs input {
            border-radius: 8px;
            border: 2px solid #ccc;
            outline: none;
            background: rgba(255,255,255,0.05);
            color: inherit;
            font-weight: bold;
        }

        .inputs input:focus {
            border-color: #d4af37;
        }

        /* تنسيق جدول اختيار الدولة */
        .country-table {
            width: 100%;
            margin-bottom: 15px;
            border-collapse: collapse;
        }
        .country-table td {
            padding: 0;
        }
    </style>
</head>

<body>

<nav class="navbar" id="mainNav">
  <div class="navbar__logo">&#9992; Nile Horizon</div>
  <ul class="navbar__links">
    <li><a class="navbar__link" href="home.html">Home</a></li>
    <li><a class="navbar__link" href="flights.html">Flights</a></li>
    <li><a class="navbar__link" href="payment.html">Book the Travel</a></li>
    <li><a class="navbar__link" href="passenger.html">Passenger Details</a></li>
    <li><a class="navbar__link" href="my-bookings.html">My Bookings</a></li>
    <li><a class="navbar__link" href="about.html">About</a></li>
    <li><a class="navbar__link" href="contact.html">Contact</a></li>
    <li><a class="navbar__link" href="sign.html">Login / Sign up</a></li>
  </ul>
  <button class="theme-toggle" id="themeToggleBtn">&#127769;</button>
</nav>

<main class="container" style="display:flex; justify-content:center; padding:50px 20px;">
  <div class="card shadow-card" style="max-width:450px; width:100%; padding:40px; text-align:center; border-radius:20px;">

    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:30px;">
      <button class="tab-btn active" id="loginTabBtn" onclick="switchForm('login')">Login</button>
      <button class="tab-btn" id="signupTabBtn" onclick="switchForm('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <section id="loginForm" class="form-section active">
      <h1>Welcome Back</h1>

      <div class="inputs" style="text-align:left; margin-top:20px;">
        <label>Email Address</label>
        <input type="email" id="loginEmail" style="width:100%; padding:14px; margin-bottom:15px;">

        <label>Password</label>
        <input type="password" id="loginPass" style="width:100%; padding:14px;">
      </div>

      <button onclick="validateLogin()" style="width:100%; margin-top:20px; padding:16px; background:#d4af37; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">
        Login
      </button>
    </section>

    <!-- SIGN UP -->
    <section id="signupForm" class="form-section">
      <h1>Create Account</h1>

      <div class="inputs" style="text-align:left; margin-top:20px;">
        <label>Full Name</label>
        <input type="text" id="newName" style="width:100%; padding:14px; margin-bottom:15px;">

        <label>Email</label>
        <input type="email" id="newEmail" style="width:100%; padding:14px; margin-bottom:15px;">

        <label>Phone Number</label>
        
        <!-- استخدام Table لتنظيم كود الدولة ورقم الهاتف -->
        <table class="country-table">
            <tr>
                <td style="width: 35%; padding-right: 10px;">
                    <select id="countryCode" style="width:100%; padding:12px; border-radius:6px; border: 2px solid #ccc;">
                        <option value="+20">🇪🇬 Egypt (+20)</option>
                        <option value="+44">🇬🇧 UK (+44)</option>
                        <option value="+1">🇺🇸 USA (+1)</option>
                        <option value="+962">🇯🇴 Jordan (+962)</option>
                        <option value="+965">🇰🇼 Kuwait (+965)</option>
                        <option value="+86">🇨🇳 China (+86)</option>
                        <option value="+91">🇮🇳 India (+91)</option>
                        <option value="+33">🇫🇷 France (+33)</option>
                        <option value="+39">🇮🇹 Italy (+39)</option>
                        <option value="+49">🇩🇪 Germany (+49)</option>
                        <option value="+34">🇪🇸 Spain (+34)</option>
                        <option value="+90">🇹🇷 Turkey (+90)</option>
                    </select>
                </td>
                <td>
                    <input type="tel" id="phone" placeholder="10XXXXXXXX" style="width:100%; padding:14px;">
                </td>
            </tr>
        </table>

        <label>Password</label>
        <input type="password" id="newPass" style="width:100%; padding:14px; margin-bottom:15px;">

        <label>Confirm Password</label>
        <input type="password" id="repeatPass" style="width:100%; padding:14px;">
      </div>

      <button onclick="validateSignup()" style="width:100%; margin-top:20px; padding:16px; background:#d4af37; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">
        Sign Up
      </button>
    </section>

  </div>
</main>

<script src="script.js"></script>
</body>
</html>
